<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="manifest.json" />
    <title>Login – TECH TUTORIALS</title>
    <style>
        :root { --bg: #0b0e14; --surface: #141c26; --text: #e8edf5; --muted: #8899aa; --border: #1f2a36; --accent: #00c9ff; }
        body.light { --bg: #f5f7fa; --surface: #ffffff; --text: #1a1f2b; --muted: #5a6a7a; --border: #d1d9e6; }
        * { margin:0; padding:0; box-sizing:border-box; transition: background 0.3s, color 0.3s, border 0.3s; }
        body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
        a { text-decoration:none; color:inherit; }
        .container { max-width:420px; margin:auto; padding:20px; flex:1; display:flex; flex-direction:column; justify-content:center; }
        .form-box { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:40px 30px; text-align:center; }
        .form-box h2 { font-size:28px; margin-bottom:8px; }
        .form-box p { color:var(--muted); font-size:14px; margin-bottom:24px; }
        .form-box input { width:100%; padding:12px 16px; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:16px; margin-bottom:14px; outline:none; }
        .form-box input:focus { border-color:var(--accent); }
        .form-box button { width:100%; padding:12px; border:none; border-radius:10px; background:linear-gradient(135deg,#00c9ff,#92fe9d); color:#0b0e14; font-weight:600; font-size:16px; cursor:pointer; transition:0.2s; }
        .form-box button:hover { transform:scale(1.02); }
        .form-box .error { color:#ff6666; font-size:13px; margin-top:8px; display:none; }
        .form-box .link { display:block; margin-top:16px; font-size:14px; color:var(--muted); }
        .form-box .link a { color:var(--accent); }
        .theme-toggle { position:fixed; top:20px; right:20px; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:6px 14px; border-radius:8px; cursor:pointer; font-size:14px; z-index:100; }
        @media (max-width:600px){ .form-box{ padding:30px 20px; } }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌙 Dark</button>
    <div class="container">
        <div class="form-box">
            <h2>🔐 Login</h2>
            <p>Enter your username and password to access the tutorials.</p>
            <input type="text" id="username" placeholder="Username" required />
            <input type="password" id="password" placeholder="Password" required />
            <button id="loginBtn">Login</button>
            <div id="errorMsg" class="error"></div>
            <span class="link">Don't have an account? <a href="signup.html">Sign up</a></span>
        </div>
    </div>
    <script>
        // Theme
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
        themeToggle.textContent = document.body.classList.contains('light') ? '☀️ Light' : '🌙 Dark';
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light');
            localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
            themeToggle.textContent = document.body.classList.contains('light') ? '☀️ Light' : '🌙 Dark';
        });

        // Login logic
        document.getElementById('loginBtn').addEventListener('click', () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.style.display = 'none';

            if (!username || !password) {
                errorDiv.textContent = '⚠️ Please fill in both fields.';
                errorDiv.style.display = 'block';
                return;
            }

            const users = JSON.parse(localStorage.getItem('techUsers') || '{}');
            if (!users[username]) {
                errorDiv.textContent = '❌ Username not found.';
                errorDiv.style.display = 'block';
                return;
            }
            if (users[username].password !== password) {
                errorDiv.textContent = '❌ Incorrect password.';
                errorDiv.style.display = 'block';
                return;
            }

            // Successful login
            localStorage.setItem('loggedInUser', username);
            // Redirect to the page they came from, or index
            const redirect = localStorage.getItem('loginRedirect') || 'index.html';
            localStorage.removeItem('loginRedirect');
            window.location.href = redirect;
        });

        // Enter key support
        document.getElementById('password').addEventListener('keypress', e => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js');
    </script>
</body>
</html>
